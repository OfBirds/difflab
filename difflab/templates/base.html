<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}diff.lab{% endblock %}</title>
  <style>
    :root {
      --bg: #ffffff;
      --fg: #1a1a1a;
      --bg-card: #f5f5f5;
      --border: #d0d0d0;
      --link: #0969da;
      --add-bg: #e6ffec;
      --add-fg: #1a7f37;
      --del-bg: #ffebe9;
      --del-fg: #b91c1c;
      --hunk-fg: #6e7781;
      --meta-fg: #0550ae;
      --header-bg: #dbeafe;
      --header-fg: #1e40af;
      --font-mono: 'Cascadia Code', 'Fira Mono', 'Menlo', 'Consolas', monospace;
      --font-ui: system-ui, -apple-system, sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --fg: #e6edf3;
        --bg-card: #161b22;
        --border: #30363d;
        --link: #58a6ff;
        --add-bg: #0d4429;
        --add-fg: #3fb950;
        --del-bg: #5d1f1a;
        --del-fg: #f85149;
        --hunk-fg: #8b949e;
        --meta-fg: #79c0ff;
        --header-bg: #1c2f5e;
        --header-fg: #79c0ff;
      }
    }
    html[data-theme="light"] {
      --bg: #ffffff; --fg: #1a1a1a; --bg-card: #f5f5f5; --border: #d0d0d0;
      --link: #0969da; --add-bg: #e6ffec; --add-fg: #1a7f37;
      --del-bg: #ffebe9; --del-fg: #b91c1c; --hunk-fg: #6e7781;
      --meta-fg: #0550ae; --header-bg: #dbeafe; --header-fg: #1e40af;
    }
    html[data-theme="dark"] {
      --bg: #0d1117; --fg: #e6edf3; --bg-card: #161b22; --border: #30363d;
      --link: #58a6ff; --add-bg: #0d4429; --add-fg: #3fb950;
      --del-bg: #5d1f1a; --del-fg: #f85149; --hunk-fg: #8b949e;
      --meta-fg: #79c0ff; --header-bg: #1c2f5e; --header-fg: #79c0ff;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-ui);
      line-height: 1.6;
      padding: 1rem;
    }
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: .5rem 0 1rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }
    nav a { color: var(--link); text-decoration: none; font-weight: 600; font-size: 1.1rem; }
    nav a:hover { text-decoration: underline; }
    button#theme-toggle {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--fg);
      border-radius: 4px;
      padding: .25rem .6rem;
      cursor: pointer;
      font-size: .85rem;
    }
    h1 { font-size: 1.4rem; margin-bottom: 1rem; }
    h2 { font-size: 1.1rem; margin-bottom: .5rem; }
    a { color: var(--link); }
    table { border-collapse: collapse; width: 100%; }
    th, td { text-align: left; padding: .4rem .8rem; border-bottom: 1px solid var(--border); }
    th { font-weight: 600; }
    .diff-file {
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 1rem;
      overflow: hidden;
    }
    .diff-file-header {
      background: var(--header-bg);
      color: var(--header-fg);
      padding: .4rem .8rem;
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: .85rem;
      font-weight: 600;
      list-style: none;
    }
    .diff-file-header::-webkit-details-marker { display: none; }
    .diff-body {
      overflow-x: auto;
      font-family: var(--font-mono);
      font-size: .82rem;
      line-height: 1.5;
      padding: .5rem 0;
    }
    .diff-body span { display: block; padding: 0 .8rem; white-space: pre; }
    .diff-add { background: var(--add-bg); color: var(--add-fg); }
    .diff-del { background: var(--del-bg); color: var(--del-fg); }
    .diff-hunk { color: var(--hunk-fg); font-style: italic; }
    .diff-meta { color: var(--meta-fg); }
    .diff-ctx { }
    .status-block {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: .6rem 1rem;
      font-family: var(--font-mono);
      font-size: .85rem;
      margin-bottom: 1rem;
      white-space: pre;
      overflow-x: auto;
    }
    .clean-banner {
      background: var(--add-bg);
      color: var(--add-fg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: .8rem 1rem;
      margin-bottom: 1rem;
      font-weight: 600;
    }
    .error-box {
      background: var(--del-bg);
      color: var(--del-fg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1rem 1.5rem;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <nav>
    <a href="/">diff.lab</a>
    <button id="theme-toggle" aria-label="Toggle theme">Toggle theme</button>
  </nav>
  {% block content %}{% endblock %}
  <script>
    (function () {
      var saved = localStorage.getItem('difflab-theme');
      if (saved) document.documentElement.setAttribute('data-theme', saved);
      document.getElementById('theme-toggle').addEventListener('click', function () {
        var cur = document.documentElement.getAttribute('data-theme');
        var sys = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        var next = (cur || sys) === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('difflab-theme', next);
      });
    })();
  </script>
</body>
</html>

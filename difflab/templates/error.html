{% extends "base.html" %}
{% block title %}diff.lab — {{ title }}{% endblock %}
{% block content %}
<h1>{{ title }}</h1>
<div class="error-box">{{ message }}</div>
{% if detail %}
<details class="error-detail-raw">
  <summary>Technical detail</summary>
  <pre>{{ detail }}</pre>
</details>
{% endif %}
{% endblock %}

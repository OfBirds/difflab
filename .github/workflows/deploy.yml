name: deploy

# Auto-deploy to the self-hosted runner on push to main
on:
  push:
    branches: [main]
  workflow_dispatch:

# Don't let two deploys overlap; don't cancel one in flight.
concurrency:
  group: deploy
  cancel-in-progress: false

# Least privilege by default; build job widens to packages: write for GHCR.
permissions:
  contents: read

env:
  IMAGE: ghcr.io/ofbirds/difflab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: [self-hosted]
    permissions:
      contents: read
      packages: read
    steps:
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull image
        working-directory: ${{ vars.DEPLOY_DIR }}
        run: docker compose pull

      - name: Deploy
        working-directory: ${{ vars.DEPLOY_DIR }}
        run: docker compose up -d --wait

      - name: Prune dangling images
        run: docker image prune -f

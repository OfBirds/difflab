name: Feature request
description: Suggest an idea or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? Describe it below. Be as specific as you can about what you want and why.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Is your request related to a frustration or workflow gap?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about?
    validations:
      required: false

services:
  difflab:
    image: difflab:latest
    build: .
    ports:
      - "8747:8747"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - difflab-data:/data
      - /srv/repos:/srv/repos:ro
    environment:
      DIFFLAB_DATA: /data
      DIFFLAB_ENROLL_TOKEN: ${DIFFLAB_ENROLL_TOKEN:-}
      GIT_CONFIG_COUNT: "1"
      GIT_CONFIG_KEY_0: safe.directory
      GIT_CONFIG_VALUE_0: "*"
    restart: unless-stopped

volumes:
  difflab-data:

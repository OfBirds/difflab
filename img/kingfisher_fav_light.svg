<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Pied Kingfisher favicon">
  <title>Pied Kingfisher</title>
  <defs>
    <clipPath id="fl-left">
      <rect x="0" y="0" width="16" height="32"/>
    </clipPath>
    <clipPath id="fl-right">
      <rect x="16" y="0" width="16" height="32"/>
    </clipPath>
  </defs>

  <!-- Light background -->
  <rect width="32" height="32" fill="#f8fafc" rx="5"/>

  <!-- Left wing (green) -->
  <polygon points="16,14 6,4 12,16" fill="#16a34a"/>

  <!-- Right wing (red) -->
  <polygon points="16,14 26,4 20,16" fill="#dc2626"/>

  <!-- Body — left green, right red -->
  <ellipse cx="16" cy="19" rx="7" ry="4" fill="#16a34a" clip-path="url(#fl-left)"/>
  <ellipse cx="16" cy="19" rx="7" ry="4" fill="#dc2626" clip-path="url(#fl-right)"/>

  <!-- Head — left green, right red -->
  <circle cx="16" cy="12" r="5" fill="#16a34a" clip-path="url(#fl-left)"/>
  <circle cx="16" cy="12" r="5" fill="#dc2626" clip-path="url(#fl-right)"/>

  <!-- Beak -->
  <polygon points="14,17 18,17 16,26" fill="#d97706"/>
</svg>
